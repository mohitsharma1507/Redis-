services:
  redis:
    image: redis:7-alpine
    container_name: chai-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: chai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: chai_aur_redis
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:

  
    
